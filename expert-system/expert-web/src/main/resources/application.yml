server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/expert_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      validation-query: SELECT 1
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true


mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.expert.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false

logging:
  level:
    root: info
    com.expert: debug
  file:
    name: logs/expert-system.log

expert:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: exert_secret_key
    # 设置jwt过期时间 3*60*1000
    admin-ttl: 1800000
    # 设置前端传递过来的令牌名称
    admin-token-name: token

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# 其他自定义配置
